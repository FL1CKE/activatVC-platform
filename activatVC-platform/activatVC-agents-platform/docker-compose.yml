services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agents_platform_app
    restart: unless-stopped
    ports:
      - "8888:8000"          # меняй если 8000 занят другим проектом
    env_file: .env
    environment:
      # Use service name for Postgres connection on shared network
      DATABASE_URL: postgresql+asyncpg://admin:adminpassword@startup-automation-postgres-1:5432/agents_platform
      MASTER_AGENT_BASE_URL: ${MASTER_AGENT_BASE_URL:-http://startup-automation-app-1:3000}
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
    networks:
      - shared_net

networks:
  shared_net:
    external: true
