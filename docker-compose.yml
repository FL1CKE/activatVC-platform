version: "3.9"

# ─── activatVC — Full Stack ──────────────────────────────────────────────────
#
# Запуск всего стека:
#   docker-compose up --build
#
# Сервисы:
#   postgres        — БД для Python backend (порт 5433)
#   python-backend  — FastAPI агенты (порт 8000)
#   node-chat       — Node.js AI-чат ассистент (порт 3001)
#   frontend        — Vite dev server (порт 5173) [только для разработки]
#
# Продакшн (без frontend-dev):
#   docker-compose up postgres python-backend node-chat

services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: agents_platform
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d agents_platform"]
      interval: 5s
      timeout: 5s
      retries: 10

  python-backend:
    build:
      context: ./activatVC-platform/activatVC-agents-platform
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:adminpassword@postgres:5432/agents_platform
      DEBUG: "false"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS_RAW: "http://localhost:5173,http://localhost:3001,http://node-chat:3001"
      ORCHESTRATION_MODE: standalone
      MASTER_AGENT_BASE_URL: ${MASTER_AGENT_BASE_URL:-http://localhost:3100}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - python_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  node-chat:
    build:
      context: ./ventureiq/server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      PYTHON_BACKEND_URL: http://python-backend:8000
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173}
      PORT: 3001
    depends_on:
      python-backend:
        condition: service_healthy

  # Dev-only: Vite dev server с proxy
  # В продакшне замените на nginx + vite build
  frontend-dev:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_PYTHON_BACKEND_URL: http://localhost:8000
    volumes:
      - ./ventureiq:/app
    depends_on:
      - node-chat
      - python-backend
    profiles:
      - dev

volumes:
  postgres_data:
  python_storage:
